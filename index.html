<script>
// ============================================================
//  XLSX PARSER (minimal, using JSZip)
// ============================================================
async function parseXlsx(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);

  // Parse shared strings
  const ssXml = await zip.file("xl/sharedStrings.xml")?.async("text");
  const sharedStrings = [];
  if (ssXml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(ssXml, "application/xml");
    const sis = doc.getElementsByTagName("si");
    for (let i = 0; i < sis.length; i++) {
      // Handle both <t> and <r><t> (rich text)
      const tNodes = sis[i].getElementsByTagName("t");
      let val = "";
      for (let j = 0; j < tNodes.length; j++) {
        val += tNodes[j].textContent || "";
      }
      sharedStrings.push(val);
    }
  }

  // Parse first worksheet
  const sheetXml = await zip.file("xl/worksheets/sheet1.xml")?.async("text");
  if (!sheetXml) throw new Error("Planilha não encontrada (sheet1.xml)");
  
  const parser = new DOMParser();
  const doc = parser.parseFromString(sheetXml, "application/xml");
  const rows = doc.getElementsByTagName("row");
  
  const data = [];
  for (let i = 0; i < rows.length; i++) {
    const cells = rows[i].getElementsByTagName("c");
    const rowData = {};
    for (let j = 0; j < cells.length; j++) {
      const cell = cells[j];
      const ref = cell.getAttribute("r"); // e.g. "A1"
      const type = cell.getAttribute("t");
      const vNode = cell.getElementsByTagName("v")[0];
      if (!vNode) continue;
      const raw = vNode.textContent;
      
      // Get column letter(s)
      const col = ref.replace(/[0-9]/g, "");
      
      let value;
      if (type === "s") {
        value = sharedStrings[parseInt(raw)] || "";
      } else if (type === "b") {
        value = raw === "1";
      } else {
        // Could be number or date
        value = raw;
      }
      rowData[col] = value;
    }
    data.push(rowData);
  }
  
  return data; // Array of {col: value} objects, including header row
}

// ============================================================
//  CONSTANTS & HELPERS
// ============================================================
const ORIGIN_UF = {"31":"AC","32":"AM","33":"BA","34":"DF","35":"GO","36":"MT","37":"MA","38":"MG","39":"PA","40":"PI","41":"RO","42":"RR","43":"TO"};
const CLASS_ABBREV = {
  "APELAÇÃO / REMESSA NECESSÁRIA (1728)": "APELREMNEC",
  "APELAÇÃO CÍVEL (198)": "APCIV",
  "AGRAVO DE INSTRUMENTO (202)": "AI"
};
const MASC_ENTITIES = ["CONSELHO","DEPARTAMENTO","INSTITUTO","BANCO","MUNICÍPIO","MUNICIPIO","MINISTÉRIO","MINISTERIO","ESTADO","IBAMA","BNDES","DELEGADO","POSTO","CONDOMÍNIO","CONDOMINIO","DNPM","MPF"];
const FEM_ENTITIES = ["UNIÃO","UNIAO","AGÊNCIA","AGENCIA","UNIVERSIDADE","FUNDAÇÃO","FUNDACAO","CIA","EMPRESA"];
const MASC_NAMES = new Set(["EDIVALDO","GILMAR","OSMIR","EXPEDITO","JALDIR","CELSO","JULIO","SILVIO","MISAEL","GUSTAVO","OTAVIO","FELIPE","DIEGO","EDUARDO","LUIZ","DANILO","ARTHUR","JOAO","RICARDO","MARCO","MARCOS","MAGNO","PEDRO","RAFAEL","RODRIGO","JOSE","IVAN","GREGORIO","ANDRE","CARLOS","JOAQUIM","LEVY","REGINALDO","ORLY","HUMBERTO","DYOGO","RENATO","LEONARDO"]);
const FEM_NAMES = new Set(["SOPHIA","ANA","MARIA","RENATA","PAULA","CAMILA","VIDA","EDELZUITA","AMANDA","PATRICIA","TAYANE","NATHALIA","POLLYANNA"]);
const FEM_ADV_NAMES = new Set(["SOPHIA","ANA","MARIA","RENATA","PAULA","CAMILA","VIDA","EDELZUITA","AMANDA","PATRICIA","NATHALIA","POLLYANNA"]);

function stripAccents(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function getUf(cnj) {
  const m = cnj.match(/\.(\d{4})$/);
  if (m) {
    const prefix = m[1].substring(0, 2);
    if (prefix === "00") return "";
    return ORIGIN_UF[prefix] ? "/" + ORIGIN_UF[prefix] : "";
  }
  return "";
}

function normalizeOab(s) {
  if (!s) return "";
  s = s.trim();
  if (s.toUpperCase().startsWith("OAB")) {
    s = s.replace(/\s*[Nn]\.?[ºo°]?\s*/g, " ");
    return s.replace(/\s+/g, " ").trim();
  }
  if (s.toUpperCase().startsWith("ADV")) return s;
  const m = s.match(/^([\d.]+)\/(\w+)/);
  if (m) return `OAB/${m[2]} ${m[1]}`;
  return s;
}

function hasPluralMarker(name) {
  return /\bE\s+OUTR[OA]S?\b/.test((name || "").toUpperCase());
}

function isPartyFeminine(name) {
  const upper = (name || "").toUpperCase().trim();
  if (!upper) return true;
  const clean = upper.replace(/\s+E\s+OUTR[OA]S?\s*$/i, "").trim();
  const normalized = stripAccents(clean);
  if (/LTDA|S\.A\.|S\/A|SA |EIRELI|INDUSTRIA|INDÚSTRIA/.test(upper)) return true;
  const first = normalized.split(/\s+/)[0] || "";
  for (const m of MASC_ENTITIES) {
    if (normalized.startsWith(stripAccents(m))) return false;
  }
  for (const f of FEM_ENTITIES) {
    if (normalized.startsWith(stripAccents(f))) return true;
  }
  if (MASC_NAMES.has(first)) return false;
  if (FEM_NAMES.has(first)) return true;
  return true;
}

function getAdvTitle(name) {
  const fn = stripAccents((name.split(/\s+/)[0] || "").toUpperCase());
  return FEM_ADV_NAMES.has(fn) ? "DRA." : "DR.";
}

function buildPelaPrefix(partyName, isActivePole, classType) {
  const fem = isPartyFeminine(partyName);
  const plural = hasPluralMarker(partyName);
  const isAgravo = classType.toUpperCase().includes("AGRAVO");
  
  let role, prefix;
  if (isActivePole) {
    if (isAgravo) {
      role = plural ? "AGRAVANTES" : "AGRAVANTE";
    } else {
      role = plural ? "APELANTES" : "APELANTE";
    }
    prefix = plural ? (fem ? "PELAS" : "PELOS") : (fem ? "PELA" : "PELO");
  } else {
    if (isAgravo) {
      role = plural ? (fem ? "AGRAVADAS" : "AGRAVADOS") : (fem ? "AGRAVADA" : "AGRAVADO");
    } else {
      role = plural ? (fem ? "APELADAS" : "APELADOS") : (fem ? "APELADA" : "APELADO");
    }
    prefix = plural ? (fem ? "PELAS" : "PELOS") : (fem ? "PELA" : "PELO");
  }
  return `${prefix} ${role}:`;
}

function determinePole(rep, pa, pp) {
  const ru = (rep || "").toUpperCase().trim();
  const pau = (pa || "").toUpperCase().trim();
  const ppu = (pp || "").toUpperCase().trim();
  if (!ru) return true;
  const matchA = pau && (ru.includes(pau) || pau.includes(ru));
  const matchP = ppu && (ru.includes(ppu) || ppu.includes(ru));
  if (matchA && !matchP) return true;
  if (matchP && !matchA) return false;
  const rw = new Set(ru.split(/\s+/).filter(w => w.length > 3));
  const paw = new Set(pau.split(/\s+/).filter(w => w.length > 3));
  const ppw = new Set(ppu.split(/\s+/).filter(w => w.length > 3));
  const ma = [...rw].filter(w => paw.has(w)).length;
  const mp = [...rw].filter(w => ppw.has(w)).length;
  return ma >= mp;
}

// ============================================================
//  DATA PROCESSING
// ============================================================
let processedData = null;

function processExcelData(rows) {
  // rows[0] = header, rows[1..] = data
  const header = rows[0];
  const dataRows = rows.slice(1).filter(r => r.D); // must have CNJ
  
  const items = [];
  for (const r of dataRows) {
    const cnj = (r.D || "").trim();
    const classe = (r.A || "").trim();
    let relator = (r.F || "").trim();
    const tipo = (r.G || "").trim();
    const modalidade = (r.H || "").trim();
    const advogado = (r.J || "").trim();
    const oab = normalizeOab((r.K || "").trim());
    const representada = (r.O || "").trim();
    const pa = (r.P || "").trim();
    const pp = (r.Q || "").trim();
    const obsC = (r.C || "").trim();
    
    const uf = getUf(cnj);
    const abbrev = CLASS_ABBREV[classe] || classe;
    
    let pedidoVista = false;
    if (relator.toUpperCase().includes("PEDIDO DE VISTA")) {
      relator = relator.replace(/\s*-\s*PEDIDO DE VISTA/i, "").trim();
      pedidoVista = true;
    }
    let relDisplay = relator;
    if (!relDisplay.toUpperCase().startsWith("EXMO")) {
      relDisplay = "EXMO. SR. " + relDisplay;
    }
    
    const isPresencial = modalidade.toUpperCase().includes("PRESENCIAL");
    
    const obs = [];
    let priority = 4;
    if (pedidoVista) {
      obs.push("PEDIDO DE VISTA.");
      priority = 0;
    }
    if (obsC && !["", "NONE", "DUAS SUSTS"].includes(obsC.toUpperCase())) {
      if (obsC.toUpperCase().includes("IDOSO")) {
        obs.push("PREFERÊNCIA LEGAL NA ORDEM DE VOTAÇÃO (IDOSO).");
        if (priority > 1) priority = 1;
      } else if (obsC.toUpperCase().includes("GESTANTE")) {
        obs.push("PREFERÊNCIA LEGAL NA ORDEM DE VOTAÇÃO (GESTANTE).");
        if (priority > 1) priority = 1;
      } else if (obsC.toUpperCase().includes("LACTANTE")) {
        obs.push("PREFERÊNCIA LEGAL NA ORDEM DE VOTAÇÃO (LACTANTE).");
        if (priority > 1) priority = 1;
      } else if (obsC.toUpperCase().includes("COMPROMISSO")) {
        obs.push(`ADVOGADO(A) INFORMA: ${obsC.toUpperCase()}.`);
      } else {
        obs.push(obsC.toUpperCase());
      }
    }
    if (priority > 2 && isPresencial) priority = 2;
    
    const isActive = determinePole(representada, pa, pp);
    const pelaStr = buildPelaPrefix(representada, isActive, classe);
    
    items.push({
      cnj, cnjDisplay: `${abbrev} ${cnj}${uf}`, classe, tipo,
      relatorDisplay: relDisplay.toUpperCase(),
      pa, pp, priority, obs, isPresencial,
      lawyer: {
        title: getAdvTitle(advogado),
        advogado,
        oab,
        isPresencial,
        representada,
        pelaStr,
        isActivePole: isActive
      }
    });
  }
  
  // Group by CNJ
  function groupEntries(arr) {
    const groups = new Map();
    for (const r of arr) {
      if (!groups.has(r.cnj)) {
        groups.set(r.cnj, {
          cnjDisplay: r.cnjDisplay, classe: r.classe,
          relatorDisplay: r.relatorDisplay,
          poloAtivo: r.pa, poloPassivo: r.pp,
          priority: r.priority, obs: [...r.obs],
          lawyers: [r.lawyer]
        });
      } else {
        const g = groups.get(r.cnj);
        g.priority = Math.min(g.priority, r.priority);
        for (const o of r.obs) {
          if (!g.obs.includes(o)) g.obs.push(o);
        }
        g.lawyers.push(r.lawyer);
      }
    }
    
    for (const entry of groups.values()) {
      entry.lawyers.sort((a, b) => (a.isActivePole ? 0 : 1) - (b.isActivePole ? 0 : 1));
      if (entry.lawyers.length > 1) {
        const allActive = entry.lawyers.every(l => l.isActivePole);
        const allPassive = entry.lawyers.every(l => !l.isActivePole);
        if (allActive) {
          for (let i = 1; i < entry.lawyers.length; i++) {
            entry.lawyers[i].isActivePole = false;
            entry.lawyers[i].pelaStr = buildPelaPrefix(entry.lawyers[i].representada, false, entry.classe);
          }
        } else if (allPassive) {
          entry.lawyers[0].isActivePole = true;
          entry.lawyers[0].pelaStr = buildPelaPrefix(entry.lawyers[0].representada, true, entry.classe);
        }
      }
    }
    
    const result = [...groups.values()];
    result.sort((a, b) => a.priority - b.priority);
    return result;
  }
  
  const susts = items.filter(r => r.tipo.toUpperCase().includes("SUSTENTAÇÃO"));
  const prefs = items.filter(r => !r.tipo.toUpperCase().includes("SUSTENTAÇÃO"));
  
  return {
    sustentacoes: groupEntries(susts),
    preferencias: groupEntries(prefs)
  };
}

// ============================================================
//  WORD GENERATION
// ============================================================
function generateWord(data) {
  const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
  
  const baseRun = { font: "Arial", size: 24, color: "000000" };
  const grayRun = { font: "Arial", size: 24, color: "000000" };
  const basePara = {
    spacing: { before: 60, after: 0, line: 360 },
    indent: { left: -20, right: -20 }
  };
  
  const headerPara = (text, bold = true) => new Paragraph({
    ...basePara, alignment: AlignmentType.CENTER,
    children: [new TextRun({ ...baseRun, text, bold })]
  });
  const sectionTitle = (text) => new Paragraph({
    ...basePara,
    children: [new TextRun({ ...baseRun, text, bold: true, highlight: "yellow" })]
  });
  const relatorPara = (num, text) => new Paragraph({
    ...basePara,
    children: [new TextRun({ ...baseRun, bold: true, text: `${num}. ${text}` })]
  });
  const grayPara = (text) => new Paragraph({
    ...basePara, alignment: AlignmentType.JUSTIFIED,
    children: [new TextRun({ ...grayRun, text })]
  });
  const grayHL = (text) => new Paragraph({
    ...basePara, alignment: AlignmentType.JUSTIFIED,
    children: [new TextRun({ ...grayRun, text, highlight: "yellow" })]
  });
  const pelaPara = (pela, name) => new Paragraph({
    ...basePara, alignment: AlignmentType.JUSTIFIED,
    children: [
      new TextRun({ ...grayRun, text: pela, bold: true }),
      new TextRun({ ...grayRun, text: ` ${name.toUpperCase()}` })
    ]
  });
  const obsPara = (text) => new Paragraph({
    ...basePara, alignment: AlignmentType.JUSTIFIED,
    children: [new TextRun({ ...grayRun, text: `OBS: ${text}`, bold: true, highlight: "yellow" })]
  });
  const sep = () => new Paragraph({
    ...basePara, alignment: AlignmentType.JUSTIFIED,
    children: [new TextRun({ ...grayRun, text: "___________________________________________________________________" })]
  });
  const empty = () => new Paragraph({ ...basePara, children: [] });
  
  function buildEntries(entries) {
    const p = [];
    entries.forEach((e, idx) => {
      p.push(relatorPara(idx + 1, e.relatorDisplay));
      p.push(grayPara(e.cnjDisplay));
      p.push(grayHL("SINOPSE     ITEM"));
      
      const isAgravo = (e.classe || "").toUpperCase().includes("AGRAVO");
      p.push(grayPara(`${isAgravo ? "AGRAVANTE" : "APELANTE"}: ${e.poloAtivo}`));
      p.push(grayPara(`${isAgravo ? "AGRAVADO" : "APELADO"}: ${e.poloPassivo}`));
      
      const multi = e.lawyers.length > 1;
      e.lawyers.forEach((l, li) => {
        const prefix = multi ? `${li + 1})  ` : "";
        const oab = l.oab ? ` \u2013 ${l.oab}` : "";
        const lawyerText = `${prefix}${l.title} ${l.advogado.toUpperCase()}${oab}`;
        if (l.isPresencial) {
          // "(PRESENCIAL)" em negrito separado
          p.push(new Paragraph({
            ...basePara, alignment: AlignmentType.JUSTIFIED,
            children: [
              new TextRun({ ...grayRun, text: lawyerText }),
              new TextRun({ ...grayRun, text: " (PRESENCIAL)", bold: true })
            ]
          }));
        } else {
          p.push(grayPara(lawyerText));
        }
        p.push(pelaPara(l.pelaStr, l.representada));
      });
      
      e.obs.forEach(o => p.push(obsPara(o)));
      p.push(sep());
      p.push(empty());
    });
    return p;
  }
  
  // Build header
  const turma = document.getElementById("turma").value.trim() || "TURMA";
  const sala = document.getElementById("sala").value.trim();
  const dataSessao = document.getElementById("dataSessao").value.trim() || "__.__.____";
  const numSessao = document.getElementById("numSessao").value.trim();
  
  const children = [];
  children.push(headerPara(`ÓRGÃO JULGADOR: ${turma.toUpperCase()}`));
  
  let sessionLine = numSessao ? `${numSessao} SESSÃO DE JULGAMENTO` : "SESSÃO DE JULGAMENTO";
  if (sala) sessionLine += ` PRESENCIAL`;
  sessionLine += " DO ";
  
  const sessionChildren = [new TextRun({ ...baseRun, text: sessionLine })];
  sessionChildren.push(new TextRun({ ...baseRun, text: `DIA ${dataSessao}`, bold: true }));
  if (sala) {
    sessionChildren.push(new TextRun({ ...baseRun, text: " - " }));
    sessionChildren.push(new TextRun({ ...baseRun, text: sala.toUpperCase(), bold: true }));
  }
  children.push(new Paragraph({ ...basePara, alignment: AlignmentType.CENTER, children: sessionChildren }));
  children.push(empty());
  
  children.push(sectionTitle("I\u2013 PEDIDOS DE SUSTENTAÇÃO ORAL"));
  children.push(...buildEntries(data.sustentacoes));
  
  if (data.preferencias.length > 0) {
    children.push(sectionTitle("II\u2013 PEDIDOS DE PREFERÊNCIA SEM SUSTENTAÇÃO ORAL"));
    children.push(...buildEntries(data.preferencias));
  }
  
  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 11906, height: 16838 },
          margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
        }
      },
      children
    }]
  });
  
  return Packer.toBlob(doc);
}

// ============================================================
//  UI LOGIC
// ============================================================
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileNameEl = document.getElementById("fileName");
const btnGenerate = document.getElementById("btnGenerate");
const statusEl = document.getElementById("status");
const previewEl = document.getElementById("preview");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    showStatus("Selecione um arquivo .xlsx válido.", "error");
    return;
  }
  
  fileNameEl.textContent = file.name;
  dropZone.classList.add("loaded");
  showStatus("Processando planilha...", "info");
  
  try {
    const buffer = await file.arrayBuffer();
    const rows = await parseXlsx(buffer);
    processedData = processExcelData(rows);
    
    const total = processedData.sustentacoes.length + processedData.preferencias.length;
    showStatus(`✓ ${processedData.sustentacoes.length} sustentações orais e ${processedData.preferencias.length} pedido(s) de preferência encontrados.`, "success");
    
    // Show preview
    showPreview(processedData);
    
    btnGenerate.disabled = false;
    
    // Auto-detect date from data
    if (!document.getElementById("dataSessao").value) {
      for (const r of rows.slice(1)) {
        if (r.E && typeof r.E === "string" && r.E.includes("/")) {
          const parts = r.E.split("/");
          if (parts.length === 3) {
            document.getElementById("dataSessao").value = `${parts[0]}.${parts[1]}.${parts[2]}`;
            break;
          }
        }
      }
    }
  } catch (err) {
    showStatus("Erro ao processar planilha: " + err.message, "error");
    console.error(err);
  }
}

function showPreview(data) {
  const prioLabels = {0:"VISTA", 1:"PREF.LEGAL", 2:"PRESENCIAL", 4:"VÍDEO"};
  let html = '<table><tr><th>#</th><th>Prior.</th><th>Processo</th><th>Relator</th><th>Advogado(s)</th></tr>';
  
  data.sustentacoes.forEach((e, i) => {
    const advs = e.lawyers.map(l => l.advogado).join(", ");
    const cls = e.priority <= 1 ? `prio-${e.priority}` : (e.priority === 2 ? "prio-2" : "");
    html += `<tr class="${cls}"><td>${i+1}</td><td>${prioLabels[e.priority]}</td><td>${e.cnjDisplay.substring(0,35)}</td><td>${e.relatorDisplay.substring(20,50)}...</td><td>${advs.substring(0,40)}</td></tr>`;
  });
  
  if (data.preferencias.length) {
    html += '<tr><td colspan="5" style="background:#fff3e0;font-weight:bold">PREFERÊNCIAS SEM SUSTENTAÇÃO</td></tr>';
    data.preferencias.forEach((e, i) => {
      const advs = e.lawyers.map(l => l.advogado).join(", ");
      html += `<tr><td>${i+1}</td><td>PREF</td><td>${e.cnjDisplay.substring(0,35)}</td><td>${e.relatorDisplay.substring(20,50)}...</td><td>${advs.substring(0,40)}</td></tr>`;
    });
  }
  
  html += '</table>';
  previewEl.innerHTML = html;
  previewEl.style.display = "block";
}

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = "status " + type;
}

btnGenerate.addEventListener("click", async () => {
  if (!processedData) return;
  
  btnGenerate.disabled = true;
  showStatus("Gerando documento Word...", "info");
  
  try {
    const blob = await generateWord(processedData);
    
    // Build filename
    const data = document.getElementById("dataSessao").value.replace(/\./g, "_") || "preview";
    const filename = `${data}_-_PRÉVIA_DA_LISTA_DE_SUSTENTAÇÕES_ORAIS.docx`;
    
    // Download
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    
    showStatus(`✓ Documento "${filename}" gerado com sucesso!`, "success");
  } catch (err) {
    showStatus("Erro ao gerar documento: " + err.message, "error");
    console.error(err);
  } finally {
    btnGenerate.disabled = false;
  }
});
</script>
